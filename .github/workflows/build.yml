name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          target: google_apis
          ndk: 25.2.9519653

      - name: Build Debug APK
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      - name: Install Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          target: google_apis
          ndk: 25.2.9519653

      - name: Decode keystore
        run: |
          mkdir -p ..
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ../keystore.jks
          ls -lh ../keystore.jks

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v0.2"
          gh release create $VERSION app/build/outputs/apk/release/app-release.apk \
            --title "AI Usage Tracker $VERSION" \
            --notes "Avatar redesign with realistic/mechanical perspectives, hands cupping, semi-transparent brain. Chinese UI. Database v2 with toolMode. Signed release build."
